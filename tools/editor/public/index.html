<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Adventure Editor</title>
    <link rel="stylesheet" href="/editor.css" />
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <div>
        <label for="chapterSelect">Chapter</label>
        <select id="chapterSelect"></select>
      </div>
      <nav class="toolbar-menu-bar" aria-label="Editor menus">
        <button id="fileMenuButton" type="button">File</button>
        <button id="editMenuButton" type="button">Edit</button>
        <button id="chapterMenuButton" type="button">Chapter</button>
        <button id="sceneMenuButton" type="button">Scene</button>
        <button id="viewMenuButton" type="button">View</button>
        <button id="layoutMenuButton" type="button">Layout</button>
        <button id="toolsMenuButton" type="button">Tools</button>
      </nav>
      <button id="undoButton" type="button" disabled>Undo</button>
      <button id="redoButton" type="button" disabled>Redo</button>
      <button id="saveButton" type="button">Save</button>
      <span id="status" class="status">Loading chapters...</span>
    </header>

    <section id="validationPanel" class="validation-panel" hidden></section>

    <main class="layout">
      <section class="graph-panel">
        <div id="graph"></div>
      </section>
      <div id="graphWorkspaceSplitter" class="panel-splitter graph-workspace-splitter" role="separator" aria-label="Resize graph and editor panels" aria-orientation="vertical"></div>
      <section class="workspace-panel">
        <aside class="editor-panel">
          <div id="editor"></div>
        </aside>
        <div id="editorPreviewSplitter" class="panel-splitter" role="separator" aria-label="Resize editor and preview panels"></div>
        <aside class="preview-panel">
          <div id="preview"></div>
        </aside>
      </section>
    </main>

    <datalist id="sceneIds"></datalist>
    <datalist id="startSceneIds"></datalist>
    <datalist id="chapterIds"></datalist>
    <script src="/editor.js"></script>
  </body>
</html>
