<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Adventure Editor</title>
    <link rel="stylesheet" href="/editor.css" />
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <div>
        <label for="chapterSelect">Chapter</label>
        <select id="chapterSelect"></select>
      </div>
      <button id="addSceneButton" type="button">Add Scene</button>
      <div>
        <label for="graphLayoutSelect">Graph Layout</label>
        <select id="graphLayoutSelect">
          <option value="auto">Auto</option>
          <option value="directed">Directed</option>
          <option value="organic">Organic</option>
          <option value="grid">Grid</option>
        </select>
      </div>
      <button id="fitGraphButton" type="button">Fit Graph</button>
      <button id="undoButton" type="button" disabled>Undo</button>
      <button id="redoButton" type="button" disabled>Redo</button>
      <button id="saveButton" type="button">Save</button>
      <span id="status" class="status">Loading chapters...</span>
    </header>

    <main class="layout">
      <section class="graph-panel">
        <div id="graph"></div>
      </section>
      <aside class="editor-panel">
        <div id="editor"></div>
      </aside>
      <aside class="preview-panel">
        <div id="preview"></div>
      </aside>
    </main>

    <datalist id="sceneIds"></datalist>
    <script src="/editor.js"></script>
  </body>
</html>
